[build]
  publish = "_site"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

# Καθαρές διευθύνσεις: /stories/dyo-lykoi → stories/dyo-lykoi.html
[[redirects]]
  from = "/stories/*"
  to = "/stories/:splat.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
